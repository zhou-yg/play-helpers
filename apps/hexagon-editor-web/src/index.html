<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEXGRID // Tactical Map Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt-flicker"></div>

  <header class="header">
    <div class="header__logo">
      <span class="header__logo-icon">⬡</span>
      <span class="header__logo-text">HEXGRID</span>
    </div>
    <div class="header__title">TACTICAL MAP EDITOR v2.4</div>
    <div class="header__coords" id="cursor-coords">
      <span class="label">CURSOR</span>
      <span class="value" id="coords-value">---,---</span>
    </div>
  </header>

  <main class="main">
    <aside class="sidebar">
      <div class="panel">
        <div class="panel__header">
          <span class="panel__icon">◈</span>
          <span class="panel__title">TERRAIN</span>
        </div>
        <div class="terrain-grid" id="terrain-grid">
          <!-- Generated by JS -->
        </div>
      </div>

      <div class="panel">
        <div class="panel__header">
          <span class="panel__icon">◉</span>
          <span class="panel__title">OPERATIONS</span>
        </div>
        <div class="operations">
          <button class="btn" id="btn-save">
            <span class="btn__icon">▼</span>
            <span class="btn__text">EXPORT</span>
          </button>
          <button class="btn" id="btn-load">
            <span class="btn__icon">▲</span>
            <span class="btn__text">IMPORT</span>
          </button>
          <button class="btn btn--danger" id="btn-clear">
            <span class="btn__icon">✕</span>
            <span class="btn__text">CLEAR</span>
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel__header">
          <span class="panel__icon">◐</span>
          <span class="panel__title">GRID INFO</span>
        </div>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">SIZE</span>
            <span class="info-value" id="grid-size">10×10</span>
          </div>
          <div class="info-item">
            <span class="info-label">CELLS</span>
            <span class="info-value" id="cell-count">100</span>
          </div>
          <div class="info-item">
            <span class="info-label">MODE</span>
            <span class="info-value" id="edit-mode">PAINT</span>
          </div>
        </div>
      </div>

      <input type="file" id="file-input" accept=".json" style="display:none">
    </aside>

    <section class="canvas-container">
      <canvas id="hex-canvas"></canvas>
      <div class="canvas-overlay" id="canvas-overlay">
        <div class="loading-text">INITIALIZING GRID...</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__status">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
    <div class="footer__hint">Click to paint • Drag to flood fill • Right-click to pick terrain</div>
    <div class="footer__version">BUILD 2024.03</div>
  </footer>

  <script src="hexgrid.js"></script>
</body>
</html>
