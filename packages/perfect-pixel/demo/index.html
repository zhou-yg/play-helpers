<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfect Pixel — Browser Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
      min-height: 100vh;
    }
    h1 { color: #e94560; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 24px; font-size: 14px; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px;
      background: #16213e;
      border-radius: 8px;
    }
    label { display: flex; align-items: center; gap: 6px; font-size: 14px; }
    select, input[type="number"], input[type="range"] {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #533483;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 14px;
    }
    input[type="range"] { width: 100px; }
    button {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #c73652; }
    button:disabled { background: #555; cursor: not-allowed; }
    .result-area {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: flex-start;
    }
    .panel {
      background: #16213e;
      border-radius: 8px;
      padding: 16px;
      min-width: 280px;
    }
    .panel h3 { color: #533483; margin-bottom: 12px; font-size: 16px; }
    canvas {
      border: 1px solid #333;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%;
      min-width: 64px;
      min-height: 64px;
      background: repeating-conic-gradient(#222 0% 25%, #2a2a2a 0% 50%) 0 0 / 16px 16px;
    }
    #outputCanvas {
      width: 128px;
      height: auto;
    }
    #output8xCanvas {
      width: 256px;
      height: auto;
    }
    .drop-zone {
      border: 2px dashed #533483;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #e94560; }
    .drop-zone p { color: #888; font-size: 14px; }
    #status { color: #e94560; font-size: 13px; margin-top: 8px; }
    .info { color: #aaa; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>🎮 Perfect Pixel</h1>
  <p class="subtitle">Auto detect and get perfect pixel art — pure TypeScript, browser-ready</p>

  <div class="controls">
    <label>
      Sample Method:
      <select id="sampleMethod">
        <option value="center">Center</option>
        <option value="median">Median</option>
        <option value="majority">Majority</option>
      </select>
    </label>
    <label>
      Refine Intensity:
      <input type="range" id="refineIntensity" min="0" max="0.5" step="0.05" value="0.25" />
      <span id="refineValue">0.25</span>
    </label>
    <label>
      Peak Width:
      <input type="number" id="peakWidth" value="6" min="2" max="20" style="width:60px" />
    </label>
    <label>
      Min Size:
      <input type="number" id="minSize" value="4" min="2" max="20" style="width:60px" />
    </label>
    <label>
      <input type="checkbox" id="fixSquare" checked /> Fix Square
    </label>
    <label>
      Grid Size (override):
      <input type="number" id="gridW" placeholder="W" style="width:50px" />
      ×
      <input type="number" id="gridH" placeholder="H" style="width:50px" />
    </label>
    <button id="processBtn" disabled>Process</button>
    <button id="downloadBtn" disabled>Download PNG</button>
  </div>

  <div id="status"></div>

  <div class="result-area">
    <div class="panel">
      <h3>Input</h3>
      <div class="drop-zone" id="dropZone">
        <p>📂 Drop an image here or click to select</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
      </div>
      <canvas id="inputCanvas"></canvas>
    </div>
    <div class="panel">
      <h3>Output <span id="outputSize"></span></h3>
      <canvas id="outputCanvas"></canvas>
      <div class="info" id="outputInfo"></div>
    </div>
    <div class="panel">
      <h3>Output 8× scaled</h3>
      <canvas id="output8xCanvas"></canvas>
    </div>
  </div>

  <script type="module">
    import {
      getPerfectPixel,
      imageFromFile,
      renderToCanvas,
      scaleImageNearest,
    } from "../src/index.ts";

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const inputCanvas = document.getElementById("inputCanvas");
    const outputCanvas = document.getElementById("outputCanvas");
    const output8xCanvas = document.getElementById("output8xCanvas");
    const processBtn = document.getElementById("processBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");
    const outputSizeEl = document.getElementById("outputSize");
    const outputInfoEl = document.getElementById("outputInfo");

    let currentImage = null;

    // Drag & drop
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length > 0) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) loadFile(fileInput.files[0]);
    });

    async function loadFile(file) {
      try {
        statusEl.textContent = "Loading image...";
        currentImage = await imageFromFile(file);
        renderToCanvas(currentImage, inputCanvas);
        processBtn.disabled = false;
        statusEl.textContent = `Loaded: ${currentImage.width}×${currentImage.height}`;
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
      }
    }

    // Process
    processBtn.addEventListener("click", () => {
      if (!currentImage) return;
      processBtn.disabled = true;
      statusEl.textContent = "Processing...";

      setTimeout(() => {
        try {
          const gridWVal = document.getElementById("gridW").value.trim();
          const gridHVal = document.getElementById("gridH").value.trim();
          const gridWNum = gridWVal !== "" ? parseInt(gridWVal, 10) : NaN;
          const gridHNum = gridHVal !== "" ? parseInt(gridHVal, 10) : NaN;
          const hasGridOverride = Number.isFinite(gridWNum) && gridWNum > 0 &&
                                   Number.isFinite(gridHNum) && gridHNum > 0;

          const options = {
            sampleMethod: document.getElementById("sampleMethod").value,
            refineIntensity: parseFloat(document.getElementById("refineIntensity").value),
            peakWidth: parseInt(document.getElementById("peakWidth").value, 10),
            minSize: parseFloat(document.getElementById("minSize").value),
            fixSquare: document.getElementById("fixSquare").checked,
            gridSize: hasGridOverride ? [gridWNum, gridHNum] : null,
          };

          const result = getPerfectPixel(currentImage, options);

          if (result) {
            renderToCanvas(result.image, outputCanvas);
            outputSizeEl.textContent = `(${result.refinedW}×${result.refinedH})`;
            outputInfoEl.textContent = `Original: ${currentImage.width}×${currentImage.height} → Pixel: ${result.refinedW}×${result.refinedH}`;

            try {
              const scaled = scaleImageNearest(result.image, 8);
              renderToCanvas(scaled, output8xCanvas);
            } catch (scaleErr) {
              console.error("[PerfectPixel] 8x scale error:", scaleErr);
              statusEl.textContent = `1x OK, 8x scale error: ${scaleErr.message}`;
            }

            downloadBtn.disabled = false;
            statusEl.textContent = `Done! Grid: ${result.refinedW}×${result.refinedH}`;
          } else {
            statusEl.textContent = "Failed to detect grid. Try adjusting parameters or use a different image.";
            downloadBtn.disabled = true;
          }
        } catch (err) {
          statusEl.textContent = `Error: ${err.message}`;
          console.error("[PerfectPixel] Error:", err);
          downloadBtn.disabled = true;
        }
        processBtn.disabled = false;
      }, 50);
    });

    // Download
    downloadBtn.addEventListener("click", () => {
      const canvas = output8xCanvas;
      const link = document.createElement("a");
      link.download = "perfect-pixel-8x.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    // Range slider value display
    const refineSlider = document.getElementById("refineIntensity");
    const refineValue = document.getElementById("refineValue");
    refineSlider.addEventListener("input", () => {
      refineValue.textContent = refineSlider.value;
    });
  </script>
</body>
</html>
